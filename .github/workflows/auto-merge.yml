name: Auto Review and Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-approve-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Auto approve and merge conflict-free PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: PR_NUMBER is not set."
            exit 1
          fi

          # 1. Skip if PR is draft
          is_draft=$(gh pr view "$PR_NUMBER" --json isDraft -q '.isDraft')
          if [ "$is_draft" = "true" ]; then
            echo "PR is a draft. Skipping auto-merge."
            exit 0
          fi

          # 2. Check PR state
          state=$(gh pr view "$PR_NUMBER" --json state -q '.state')
          if [ "$state" = "MERGED" ] || [ "$state" = "CLOSED" ]; then
            echo "PR is already $state. Skipping."
            exit 0
          fi

          # 3. Poll mergeable status
          echo "Checking mergeability for PR #$PR_NUMBER..."
          mergeable="UNKNOWN"
          for i in {1..12}; do
            mergeable=$(gh pr view "$PR_NUMBER" --json mergeable -q '.mergeable')
            echo "Attempt $i: Mergeable status is '$mergeable'"
            if [ "$mergeable" = "MERGEABLE" ]; then
              break
            elif [ "$mergeable" = "CONFLICTING" ]; then
              echo "PR has merge conflicts. Cannot auto-merge."
              exit 0
            fi
            sleep 10
          done

          if [ "$mergeable" != "MERGEABLE" ]; then
            echo "PR mergeable status is still $mergeable after polling. Exiting."
            exit 1
          fi

          # 4. Auto-approve
          echo "Approving PR #$PR_NUMBER..."
          gh pr review "$PR_NUMBER" --approve --body "Auto-approved conflict-free PR by StellarGive Automation bot."

          # 5. Auto-merge
          echo "Merging PR #$PR_NUMBER..."
          if ! gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "Failed to merge with delete-branch option (expected if from a fork). Retrying without delete-branch..."
            gh pr merge "$PR_NUMBER" --squash
          fi
          echo "PR #$PR_NUMBER successfully merged."
